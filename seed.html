<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pscale Shell</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0c;color:#e8e4dc;font-family:'Courier New',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{padding:12px 20px;border-bottom:1px solid #1e1e24;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#header h1{font-size:13px;letter-spacing:3px;color:#d4a574;font-weight:normal}
.hdr-btns{display:flex;gap:8px;align-items:center}
.hdr-btns button{background:#141418;border:1px solid #2a2a30;color:#8a8580;padding:5px 14px;cursor:pointer;font-family:inherit;font-size:11px;letter-spacing:1px;border-radius:2px;transition:all .2s}
.hdr-btns button:hover{border-color:#d4a574;color:#d4a574}
#stop-btn:hover{border-color:#c44!important;color:#c44!important}
#status{font-size:11px;letter-spacing:1px;margin-right:8px}

#main{flex:1;display:flex;overflow:hidden}
#shell-pane{width:45%;border-right:1px solid #1e1e24;overflow-y:auto;padding:16px;font-size:11px;line-height:1.7;color:#4a4540;white-space:pre-wrap;tab-size:2}
#right-pane{width:55%;display:flex;flex-direction:column}

#conversation{flex:1;overflow-y:auto;padding:16px}
.msg{margin:6px 0;padding:8px 12px;border-radius:3px;font-size:13px;line-height:1.6;max-width:90%}
.msg.user{background:#12121a;border-left:2px solid #7ba3c9;color:#7ba3c9;margin-left:auto}
.msg.agent{background:#18160e;border-left:2px solid #d4a574;color:#ccc8c0}
.msg.system{background:#0e100e;border-left:2px solid #5a8a5a;color:#7a9a7a;font-size:11px}

#input-bar{padding:12px 16px;border-top:1px solid #1e1e24;display:flex;gap:10px;flex-shrink:0}
#input-bar input{flex:1;background:#0e0e12;border:1px solid #1e1e24;color:#e8e4dc;padding:9px 14px;font-family:inherit;font-size:13px;border-radius:2px;outline:none}
#input-bar input:focus{border-color:#d4a574}
#input-bar button{background:#d4a574;border:none;color:#0a0a0c;padding:9px 18px;font-family:inherit;font-size:12px;font-weight:bold;cursor:pointer;border-radius:2px;letter-spacing:1px}

#log{position:fixed;bottom:0;left:0;right:0;height:0;background:#08080a;border-top:1px solid #1e1e24;overflow-y:auto;padding:0 16px;font-size:10px;color:#4a4540;transition:height .3s;z-index:10}
#log.open{height:25vh;padding:12px 16px}
#log-toggle{position:fixed;bottom:4px;right:16px;font-size:10px;color:#4a4540;cursor:pointer;z-index:11;letter-spacing:1px}
#log-toggle:hover{color:#d4a574}
</style>
</head>
<body>

<div id="header">
  <h1>PSCALE SHELL</h1>
  <div class="hdr-btns">
    <span id="status">idle</span>
    <button onclick="importShell()">IMPORT</button>
    <button onclick="exportShell()">EXPORT</button>
    <button onclick="toggleLoop()">START</button>
    <button id="stop-btn" onclick="stopShell()">STOP</button>
  </div>
</div>

<div id="main">
  <div id="shell-pane" id="shell-view"></div>
  <div id="right-pane">
    <div id="conversation"></div>
    <div id="input-bar">
      <input id="msg" placeholder="Type a message..." onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()">SEND</button>
    </div>
  </div>
</div>

<div id="log"></div>
<div id="log-toggle" onclick="document.getElementById('log').classList.toggle('open')">LOG ▲</div>

<script>
// ═══════════════════════════════════════════
// PSCALE BROWSER KERNEL
// The JS parallel to seed.py
// Same block. Same BSP. Same loops. Browser-native.
// ═══════════════════════════════════════════

// --- State ---
let block = null;
let loopTimer = null;
let pendingInput = null;
let cycling = false;

// --- BSP ---
function bsp(node, digits) {
  const chain = [];
  for (const d of digits) {
    const k = d === '0' ? '_' : d;
    if (node && typeof node === 'object' && k in node) {
      node = node[k];
      chain.push(typeof node === 'object' ? (node._ || JSON.stringify(node)) : node);
    } else break;
  }
  return chain;
}

// --- LLM Calls ---
async function callLLM(cfg, prompt) {
  const api = cfg._ || 'ollama';
  const url = cfg['1'] || 'http://localhost:11434';
  const key = cfg['2'] || '';
  const model = cfg['3'] || 'llama3.2';

  try {
    if (api === 'ollama') {
      const r = await fetch(`${url}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model, messages: [{ role: 'user', content: prompt }], stream: false })
      });
      const d = await r.json();
      return d.message?.content || '';
    }
    else if (api === 'anthropic') {
      const r = await fetch(`${url}/v1/messages`, {
        method: 'POST',
        headers: { 'x-api-key': key, 'content-type': 'application/json', 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model, max_tokens: 4096, messages: [{ role: 'user', content: prompt }] })
      });
      const d = await r.json();
      return d.content?.[0]?.text || '';
    }
    else {
      const r = await fetch(`${url}/v1/chat/completions`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ model, messages: [{ role: 'user', content: prompt }] })
      });
      const d = await r.json();
      return d.choices?.[0]?.message?.content || '';
    }
  } catch (e) {
    log(`LLM error: ${e.message}`);
    return `Error calling LLM: ${e.message}`;
  }
}

// --- Tools ---
const TOOLS = {
  web_fetch: async (args) => {
    try {
      const r = await fetch(args.url);
      const t = await r.text();
      return t.slice(0, 8000);
    } catch (e) { return `Fetch error: ${e.message}`; }
  },
  file_write: async (args) => {
    // Trigger download — the sovereign file-on-disk
    const blob = new Blob([args.content], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = args.path;
    a.click();
    return `Downloaded: ${args.path}`;
  },
  file_read: async (args) => {
    // Can't read arbitrary files from browser — return notice
    return `Browser cannot read local files directly. Use IMPORT to load a file, or web_fetch for URLs.`;
  },
  js_eval: async (args) => {
    // The browser equivalent of shell_exec — evaluate JS
    try {
      const result = eval(args.code);
      return String(result).slice(0, 4000);
    } catch (e) { return `Eval error: ${e.message}`; }
  },
  deploy_seed: async (args) => {
    // Write the current block as a deployable seed
    const seed = JSON.stringify(block, null, 1);
    const html = document.documentElement.outerHTML;
    if (args.format === 'block') {
      const blob = new Blob([seed], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = args.filename || 'shell.json';
      a.click();
      return `Seed exported as ${args.filename || 'shell.json'}`;
    } else {
      // Full self-contained HTML — kernel + block embedded
      const selfContained = html.replace(
        '// BLOCK_EMBED_POINT',
        `block = ${seed};`
      );
      const blob = new Blob([selfContained], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = args.filename || 'seed.html';
      a.click();
      return `Self-contained seed exported as ${args.filename || 'seed.html'}`;
    }
  }
};

// --- Action Queue ---
async function runActions() {
  const actions = block['9'];
  if (!actions || typeof actions !== 'object') return [];
  const results = [];
  for (const [k, v] of Object.entries(actions)) {
    if (k === '_' || typeof v !== 'object') continue;
    if (v['3'] !== 'pending') continue;
    const tool = v['1'] || '';
    let args = {};
    try { args = typeof v['2'] === 'string' ? JSON.parse(v['2']) : (v['2'] || {}); } catch(e) { args = {}; }
    try {
      // Check custom tools first (8.5+)
      if (!(tool in TOOLS)) {
        // Look for custom tool definition
        const customTools = block['8'] || {};
        for (const [ck, cv] of Object.entries(customTools)) {
          if (ck === '_' || parseInt(ck) < 5 || typeof cv !== 'object') continue;
          if (cv['1'] === tool && cv['3']) {
            try { TOOLS[tool] = eval(cv['3']); } catch(e) { /* skip */ }
          }
        }
      }
      const result = tool in TOOLS ? await TOOLS[tool](args) : `Unknown tool: ${tool}`;
      v['3'] = 'done';
      v['4'] = String(result).slice(0, 4000);
      results.push(`Tool ${tool}: ${v['4'].slice(0, 200)}`);
    } catch (e) {
      v['3'] = 'done';
      v['4'] = `Error: ${e.message}`;
      results.push(`Tool ${tool} error: ${e.message}`);
    }
  }
  return results;
}

// --- Main Cycle ---
async function cycle() {
  if (cycling) return;
  cycling = true;
  setStatus('thinking', '#d4a574');

  try {
    const cfg = block['6'] || {};
    if (cfg['5'] === 'off') { stopLoop(); cycling = false; return; }

    // Execute pending actions
    const actionResults = await runActions();

    // Build concern
    const concern = bsp(block, '40').join('\n');
    let extra = '';
    if (pendingInput) {
      extra += `\nUSER MESSAGE: ${pendingInput}`;
      // Write user message to conversation log
      const log = block['7'] || {};
      const nextKey = String(Math.max(0, ...Object.keys(log).filter(k => k !== '_').map(Number)) + 1);
      log[nextKey] = { '1': pendingInput, '2': '' };
      block['7'] = log;
      pendingInput = null;
    }
    if (actionResults.length) extra += `\nACTION RESULTS: ${actionResults.join('\n')}`;

    const prompt = `SHELL:\n${JSON.stringify(block, null, 1)}\nCONCERN:\n${concern}${extra}\nRead _ first. Act on concern. To use tools, write actions to section 9. Return updated shell as JSON.`;

    log(`Calling LLM (${cfg._ || 'ollama'} / ${cfg['3'] || 'llama3.2'})...`);
    const text = await callLLM(cfg, prompt);

    // Parse response — extract JSON
    try {
      const start = text.indexOf('{');
      const end = text.lastIndexOf('}') + 1;
      if (start >= 0 && end > start) {
        block = JSON.parse(text.slice(start, end));
        log('Block updated from LLM response.');
      } else {
        log('No JSON found in LLM response.');
      }
    } catch (e) {
      log(`JSON parse error: ${e.message}`);
    }

    renderShell();
    renderConversation();
    setStatus('running', '#8bc98b');
  } catch (e) {
    log(`Cycle error: ${e.message}`);
    setStatus('error', '#c44');
  }

  cycling = false;
}

// --- Loop Control ---
function startLoop() {
  if (loopTimer) return;
  if (!block) { log('No block loaded. Import a shell.json first.'); return; }
  const pulse = parseInt(block['6']?.['4'] || '30') * 1000;
  log(`Starting loop. Pulse: ${pulse/1000}s`);
  setStatus('running', '#8bc98b');
  cycle(); // First cycle immediately
  loopTimer = setInterval(cycle, pulse);
  document.querySelector('.hdr-btns button:nth-child(4)').textContent = 'RUNNING';
}

function stopLoop() {
  if (loopTimer) clearInterval(loopTimer);
  loopTimer = null;
  setStatus('stopped', '#c44');
  document.querySelector('.hdr-btns button:nth-child(4)').textContent = 'START';
  log('Loop stopped.');
}

function toggleLoop() {
  if (loopTimer) stopLoop();
  else startLoop();
}

function stopShell() {
  if (block && block['6']) block['6']['5'] = 'off';
  stopLoop();
  renderShell();
}

// --- UI ---
function renderShell() {
  const el = document.getElementById('shell-pane');
  if (block) el.textContent = JSON.stringify(block, null, 2);
  else el.textContent = 'No block loaded.\n\nClick IMPORT to load a shell.json,\nor paste a seed JSON below.';
}

function renderConversation() {
  const cv = document.getElementById('conversation');
  if (!block || !block['7']) return;
  const log = block['7'];
  cv.innerHTML = '';
  for (const k of Object.keys(log).filter(k => k !== '_').sort((a,b) => Number(a) - Number(b))) {
    const e = log[k];
    if (typeof e !== 'object') continue;
    if (e['1']) cv.innerHTML += `<div class="msg user">${esc(e['1'])}</div>`;
    if (e['2']) cv.innerHTML += `<div class="msg agent">${esc(e['2'])}</div>`;
  }
  cv.scrollTop = cv.scrollHeight;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function send() {
  const input = document.getElementById('msg');
  const text = input.value.trim();
  if (!text) return;
  pendingInput = text;
  input.value = '';
  // Show immediately in conversation
  const cv = document.getElementById('conversation');
  cv.innerHTML += `<div class="msg user">${esc(text)}</div>`;
  cv.scrollTop = cv.scrollHeight;
  // If not looping, run a single cycle
  if (!loopTimer) cycle();
}

function setStatus(text, color) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.style.color = color;
}

function log(msg) {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString();
  el.innerHTML += `<div style="margin:2px 0">[${t}] ${esc(msg)}</div>`;
  el.scrollTop = el.scrollHeight;
}

// --- Import / Export ---
function importShell() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      block = JSON.parse(text);
      log(`Loaded: ${file.name}`);
      renderShell();
      renderConversation();
      addSystemMessage('Shell loaded. Press START to begin the loop, or type a message.');
    } catch (err) {
      log(`Import error: ${err.message}`);
    }
  };
  input.click();
}

function exportShell() {
  if (!block) { log('No block to export.'); return; }
  const blob = new Blob([JSON.stringify(block, null, 1)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'shell.json';
  a.click();
  log('Exported shell.json');
}

function addSystemMessage(text) {
  const cv = document.getElementById('conversation');
  cv.innerHTML += `<div class="msg system">${esc(text)}</div>`;
  cv.scrollTop = cv.scrollHeight;
}

// --- Boot ---
// BLOCK_EMBED_POINT
// If block was embedded above (self-contained seed), it's already set.
// Otherwise, prompt to import.

if (!block) {
  renderShell();
  addSystemMessage('No block loaded. Import a shell.json to begin, or drag one onto this page.');
} else {
  renderShell();
  renderConversation();
  addSystemMessage('Block embedded. Press START to begin the loop.');
}

// Drag and drop support
document.body.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); });
document.body.addEventListener('drop', async (e) => {
  e.preventDefault();
  e.stopPropagation();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    block = JSON.parse(text);
    log(`Loaded: ${file.name}`);
    renderShell();
    renderConversation();
    addSystemMessage('Shell loaded via drag & drop. Press START to begin.');
  } catch (err) {
    log(`Drop error: ${err.message}`);
  }
});
</script>
</body>
</html>
